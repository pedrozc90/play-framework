# Number of database connections
# See https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
# db connections = ((physical_core_count * 2) + effective_spindle_count)
fixedConnectionPool = 9

# Play configurations
play {
    application {
        loader = "play.api.inject.guice.GuiceApplicationLoader" # Default
    }

    modules {
        enabled += "ApplicationModule"
    }

    http {
        filters = "core.play.filters.Filters"
        errorHandler = "core.play.handlers.ErrorHandler"

        secret {
            key = "changeme"
        }

        parser {
            maxMemoryBuffer = 128K  # Default: 100K
            maxDiskBuffer = 16M     # Default: 10M
            maxLength = 16M         # Default: 10M
        }
    }

    server {
        http {
            idleTimeout = 75s       # Default: 75s
        }

        https {
            idleTimeout = 75s       # Default: 75s
        }
    }

    i18n {
        langs = [ "en" ]
    }

    # Evolution configuration
    evolutions {
        enabled = true
        autoApply = false  # set to true if you want automatic application
        autoApplyDowns = false  # set to true to allow automatic downgrades (dangerous in production)
    }

    # Set Hikari to fixed size
    prototype {
        hikaricp {
            minimumIdle = ${fixedConnectionPool}
            maximumPoolSize = ${fixedConnectionPool}
        }
    }
}

# Database configuration
db {
    default {
        driver = org.postgresql.Driver
        dialect = "org.hibernate.dialect.PostgreSQL82Dialect"
        url = "jdbc:postgresql://localhost:5432/play"
        username = "postgres"
        password = "postgres"
        jndiName = DefaultDS
    }
}

# JPA configuration
jpa {
    default = defaultPersistenceUnit
}

# Job queue sized to HikariCP connection pool
database.dispatcher {
    executor = "thread-pool-executor"
    throughput = 1
    thread-pool-executor {
        fixed-pool-size = ${fixedConnectionPool}
    }
}

# Akka configurations
akka {
    loggers = ["akka.event.slf4j.Slf4jLogger"]
    loglevel = "INFO"
    log-dead-letters = 10
    log-dead-letters-during-shutdown = on

    actor {
        debug {
            receive = on
            lifecycle = on
        }
        default-dispatcher {
              fork-join-executor {
                    parallelism-min = 2
                    parallelism-factor = 2.0
                    parallelism-max = 16
                    task-peeking-mode = FIFO
              }
        }
    }
}

# Http Server configuration
http.port = 9000

# Custom configurations
application {
    name = "Boilerplate"
    version = "0.0.0"
}
